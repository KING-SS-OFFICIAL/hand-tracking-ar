<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Full-Body AR Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewport">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <canvas id="text-layer"></canvas>

    <!-- HUD top-left -->
    <div id="hud-top-left">
      <div class="hud-row"><span class="hud-label">FPS</span><span id="fps">0</span></div>
      <div class="hud-row"><span class="hud-label">HANDS</span><span id="hand-count">0</span></div>
      <div class="hud-row"><span class="hud-label">GESTURE</span><span id="gesture-name">NONE</span></div>
      <div class="hud-row"><span class="hud-label">POSE</span><span id="pose-status">OFF</span></div>
      <div class="hud-row"><span class="hud-label">FACE</span><span id="face-status">OFF</span></div>
      <div class="hud-row"><span class="hud-label">IRIS</span><span id="iris-status">OFF</span></div>
    </div>

    <!-- Title bar -->
    <div id="title-bar">
      <span class="title-text">FULL-BODY <span class="accent">AR</span></span>
      <span id="status">INIT</span>
    </div>

    <!-- Mode toggles -->
    <div id="mode-panel">
      <button class="mode-btn active" id="tog-pose" title="Body Pose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2.5"/><path d="M10 22V14l-4-4M14 22V14l4-4M7 10h10"/></svg>
        <span>BODY</span>
      </button>
      <button class="mode-btn active" id="tog-face" title="Face Mesh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="10" r="1.2" fill="currentColor"/><circle cx="15" cy="10" r="1.2" fill="currentColor"/><path d="M8 15c1.5 1.5 6.5 1.5 8 0"/></svg>
        <span>FACE</span>
      </button>
      <button class="mode-btn active" id="tog-hands" title="Hand Tracking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a1 1 0 0 0-2 0M14 6V4a1 1 0 0 0-2 0v6M10 6V5a1 1 0 0 0-2 0v8M6 13V9a1 1 0 0 0-2 0v7a8 8 0 0 0 16 0v-3a1 1 0 0 0-2 0"/></svg>
        <span>HANDS</span>
      </button>
      <button class="mode-btn active" id="tog-iris" title="Iris Tracking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M2 12s4-8 10-8 10 8 10 8-4 8-10 8S2 12 2 12z"/></svg>
        <span>IRIS</span>
      </button>
    </div>

    <!-- Controls bottom-center -->
    <div id="controls">
      <button id="btn-camera" class="ctrl-btn" title="Switch Camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 16V7a2 2 0 0 0-2-2h-3l-2-2H9L7 5H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"/><circle cx="12" cy="11" r="3"/></svg>
      </button>
      <button id="btn-record" class="ctrl-btn record-btn" title="Record">
        <span class="rec-dot"></span>
      </button>
      <button id="btn-fullscreen" class="ctrl-btn" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8V5a2 2 0 0 1 2-2h3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg>
      </button>
    </div>

    <!-- Record indicator -->
    <div id="rec-indicator" class="hidden">
      <span class="rec-blink"></span> REC <span id="rec-time">00:00</span>
    </div>
  </div>

  <!-- Start screen -->
  <div id="start-overlay">
    <div id="start-box">
      <div class="pulse-ring"></div>
      <h1>FULL-BODY <span class="accent">AR</span></h1>
      <p class="subtitle">Face &bull; Eyes &bull; Hands &bull; Body Pose</p>
      <button id="start-btn">START TRACKING</button>
      <p>Allow webcam access for full-body tracking</p>
    </div>
  </div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
